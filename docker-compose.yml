services:
  abs-app:
    build: .
    image: abs-app:latest
    container_name: abs-app
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - ./output:/app/output
      - ./imports:/app/imports
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
